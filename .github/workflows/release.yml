name: Deploy to Google Play

on:
  pull_request:
    types: [closed]
    branches:
      - feature/add-firebase

jobs:
  build:
    if: github.event.pull_request.merged == true
    name: Building and distributing app (Release)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name:  Assemble Release Bundle
        run: ./gradlew bundleRelease

      - name: Debug keystore decode
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > debug-release-key.jks
          keytool -list -v -keystore debug-release-key.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" || echo "Failed to list keystore"

      - name: Sign Release
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}


      - name: Upload signed APK to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIALS_FILE_CONTENT }}
          groups: testers
          file: app/build/outputs/bundle/release/app-release.aab
          releaseNotes: "Automatic release build from develop branch"