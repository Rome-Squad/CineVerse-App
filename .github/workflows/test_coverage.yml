name: Test & Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
permissions:
  checks: write
  pull-requests: write
  contents: read
jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🛠️ Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ⚙️ Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🏗️ Build with Gradle (ignore warnings)
        run: ./gradlew build -x test --warning-mode=all

      - name: 📦 Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
  test:
    name: Test & Coverage Analysis
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🛠️ Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ⚙️ Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🧾 Create google-services.json in app/
        env:
          DATA: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$DATA" | base64 --decode > app/google-services.json

          echo "✅ File created at app/google-services.json"
          ls -la app/google-services.json
          head -n 10 app/google-services.json || echo "❌ File is empty"
          

      - name: 🧪 Run Tests with Coverage
        continue-on-error: true
        run: |
          ./gradlew :domain:movie:test :domain:movie:jacocoTestReport
          ./gradlew :domain:user:test :domain:user:jacocoTestReport
          ./gradlew :domain:series:test :domain:series:jacocoTestReport

      - name: 📊 Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            domain/movies/build/reports/jacoco/test/html
            domain/user/build/reports/jacoco/test/html
            domain/series/build/reports/jacoco/test/html

      - name: 📝 Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "**/build/test-results/**/*.xml"

      - name: 🚨 Check Coverage Verification
        run: |
          ./gradlew :domain:movie:jacocoTestCoverageVerification
          ./gradlew :domain:user:jacocoTestCoverageVerification
          ./gradlew :domain:series:jacocoTestCoverageVerification

      - name: 📨 Notify on Failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Test or Coverage checks failed! Please check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            })